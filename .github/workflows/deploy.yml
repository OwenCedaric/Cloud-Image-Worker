name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Deployment Assets
        run: |
          # 1. Prepare common variables
          DOMAIN="${{ secrets.WORKER_DOMAIN }}"
          # shellcheck disable=SC2001
          ESCAPED_DOMAIN=$(echo "$DOMAIN" | sed 's/\./\\./g')
          
          # 2. Generate wrangler.toml
          cat <<EOF > wrangler.toml
          name = "${{ vars.WORKER_NAME || 'cloud-image-worker' }}"
          main = "src/index.ts"
          compatibility_date = "2024-03-24"

          [[r2_buckets]]
          binding = "${{ vars.R2_BINDING || 'tinge' }}"
          bucket_name = "${{ vars.R2_BUCKET || 'tinge' }}"

          [vars]
          GH_USER = "${{ secrets.GH_USER }}"
          GH_REPO = "${{ secrets.GH_REPO }}"
          IMAGE_DOMAIN = "${{ secrets.IMAGE_DOMAIN }}"
          WORKER_DOMAIN = "$DOMAIN"
          PUBLIC_URL = "${{ secrets.PUBLIC_URL }}"

          [[routes]]
          pattern = "$DOMAIN"
          custom_domain = true
          
          [assets]
          directory = "./public"

          [[rules]]
          type = "CompiledWasm"
          globs = ["**/*.wasm"]
          fallbacks = []
          fallthrough = true
          EOF

          # 3. Generate Surge module in public/
          mkdir -p public
          cat <<EOF > public/surge.sgmodule
          #!name=Cloud Image Worker Auth
          #!desc=自动注入 Cloud-Image-Worker API 验证所需的 X-Worker-Auth Header
          #!category=Cloud-Image-Worker
          #!arguments=Auth:鉴权Token

          [Header Rewrite]
          ^https?://$ESCAPED_DOMAIN/api/ header-add X-Worker-Auth {{{Auth}}}

          [MITM]
          hostname = %APPEND% $DOMAIN
          EOF

          # 4. Prepare local assets
          mkdir -p public/fonts
          cp src/assets/style.css public/style.css
          cp node_modules/@fontsource/noto-sans-sc/files/* public/fonts/
          cp node_modules/@fontsource/noto-serif-sc/files/* public/fonts/
          
          # Combine CSS and fix paths
          cat node_modules/@fontsource/noto-sans-sc/index.css > public/fonts.css
          cat node_modules/@fontsource/noto-serif-sc/index.css >> public/fonts.css
          sed -i 's|\./files/|/fonts/|g' public/fonts.css

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            GH_TOKEN
            AUTH_TOKEN
        env:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}
            AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
