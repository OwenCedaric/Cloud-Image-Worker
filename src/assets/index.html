<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Image Worker | Minimalist Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: {{BG}};
            --surface: {{WHITE}};
            --text: {{BLACK}};
            --accent: {{ACCENT}};
            --subtle: {{SLATE}};
            --border: #E2E8F0;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 720px;
            background: var(--surface);
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header {
            margin-bottom: 2.5rem;
            text-align: center;
        }
        .logo {
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--subtle);
            margin-bottom: 1rem;
            display: block;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            color: var(--subtle);
            font-size: 1rem;
            font-weight: 500;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
        }
        .tab {
            padding: 0.75rem 0;
            cursor: pointer;
            font-weight: 600;
            color: var(--subtle);
            position: relative;
            user-select: none;
        }
        .tab.active {
            color: var(--text);
        }
        .tab.active::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 100%;
            height: 2px;
            background: var(--accent);
        }
        
        .tab-content {
            display: none;
            margin-bottom: 2rem;
        }
        .tab-content.active {
            display: block;
        }

        /* Form area */
        textarea {
            width: 100%;
            min-height: 160px;
            padding: 1.25rem;
            font-family: inherit;
            font-size: 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            resize: vertical;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #FAFAFA;
        }
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.03);
            background: var(--surface);
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 3rem 2rem;
            text-align: center;
            background: #FAFAFA;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent);
            background: #F1F5F9;
        }
        .upload-area input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            opacity: 0;
            cursor: pointer;
        }
        .upload-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
            display: block;
        }
        .upload-text {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .upload-subtext {
            font-size: 0.875rem;
            color: var(--subtle);
        }
        .file-list {
            margin-top: 1rem;
            text-align: left;
            font-size: 0.875rem;
        }
        
        button {
            width: 100%;
            background: var(--accent);
            color: var(--surface);
            border: none;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: var(--radius);
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Results */
        .results-area {
            display: none;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .results-header h2 { font-size: 1.25rem; font-weight: 700; }
        
        .result-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
        .result-item {
            padding: 1rem;
            background: #F8FAFC;
            border: 1px solid var(--border);
            border-radius: calc(var(--radius) - 4px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .result-item a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9375rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-item a:hover { color: var(--subtle); }

        .btn-inline {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            width: auto;
            border-radius: 6px;
        }
        .btn-inline:hover { background: #F1F5F9; }

        #status {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--subtle);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            body { padding: 1rem; }
            .container { padding: 2rem 1.5rem; }
            h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="logo">Cloud-Image-Worker</span>
            <h1>File Processor</h1>
            <p class="subtitle">Upload files or provide links instantly.</p>
        </header>

        <main>
            <div class="tabs">
                <div class="tab active" onclick="setTab('upload')">File Upload</div>
                <div class="tab" onclick="setTab('url')">URL Links</div>
            </div>

            <div id="tab-upload" class="tab-content active">
                <div class="upload-area" id="uploadArea">
                    <span class="upload-icon">📁</span>
                    <div class="upload-text">Click to browse or drag files here</div>
                    <div class="upload-subtext">Supports multiple files</div>
                    <input type="file" id="fileInput" multiple>
                </div>
                <div class="file-list" id="fileList"></div>
            </div>

            <div id="tab-url" class="tab-content">
                <textarea id="urls" placeholder="Paste media URLs (one per line)..."></textarea>
            </div>
            
            <button id="processBtn" onclick="processItems()">
                <span>Process Links/Files</span>
            </button>
            <div id="status"></div>

            <section class="results-area" id="resultsArea">
                <div class="results-header">
                    <h2>Generated Links</h2>
                    <button class="btn-inline" onclick="copyAll()">Copy All</button>
                </div>
                <div class="result-list" id="resultList"></div>
            </section>
        </main>
    </div>

    <script>
        let currentTab = 'upload';
        let selectedFiles = [];

        const statusEl = document.getElementById('status');
        const urlsEl = document.getElementById('urls');
        const processBtn = document.getElementById('processBtn');
        const resultsArea = document.getElementById('resultsArea');
        const resultList = document.getElementById('resultList');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileListDisplay = document.getElementById('fileList');

        function setTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        // File Selection Handlers
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            if (selectedFiles.length > 0) {
                fileListDisplay.innerHTML = `<strong>${selectedFiles.length} file(s) selected:</strong><br>` + 
                    selectedFiles.slice(0, 3).map(f => f.name).join('<br>') + 
                    (selectedFiles.length > 3 ? '<br>...' : '');
            } else {
                fileListDisplay.innerHTML = '';
            }
        }

        async function processItems() {
            processBtn.disabled = true;
            statusEl.innerText = 'Processing...';
            resultList.innerHTML = '';
            resultsArea.style.display = 'none';

            try {
                let res;
                if (currentTab === 'url') {
                    const lines = urlsEl.value.split('\n').map(l => l.trim()).filter(l => l !== '');
                    if (lines.length === 0) throw new Error('Please enter at least one URL');
                    
                    res = await fetch('/api/convert', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ urls: lines })
                    });
                } else if (currentTab === 'upload') {
                    if (selectedFiles.length === 0) throw new Error('Please select at least one file');
                    
                    const formData = new FormData();
                    selectedFiles.forEach((file) => formData.append('file', file));
                    
                    res = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });
                }

                if (res.status === 401) throw new Error('Unauthorized');
                const data = await res.json();
                
                if (data.results && Object.keys(data.results).length > 0) {
                    statusEl.innerText = '';
                    Object.entries(data.results).forEach(([input, output]) => {
                        const item = document.createElement('div');
                        item.className = 'result-item';
                        const isError = output.startsWith('Error:');
                        item.innerHTML = `
                            <div style="flex: 1; overflow: hidden;">
                                <div style="font-size: 0.75rem; color: var(--subtle); margin-bottom: 0.2rem; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;">${input}</div>
                                ${isError ? `<span style="color: #EF4444; font-size: 0.875rem;">${output}</span>` : `<a href="${output}" target="_blank">${output}</a>`}
                            </div>
                            <button class="btn-inline" ${isError ? 'disabled' : ''} onclick="copyText('${output}')">Copy</button>
                        `;
                        resultList.appendChild(item);
                    });
                    resultsArea.style.display = 'block';
                    
                    // Reset inputs
                    urlsEl.value = '';
                    selectedFiles = [];
                    fileListDisplay.innerHTML = '';
                    fileInput.value = '';
                } else {
                    throw new Error(data.error || 'Processing failed');
                }
            } catch (e) {
                statusEl.innerText = 'Error: ' + e.message;
            } finally {
                processBtn.disabled = false;
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = 'Copied';
                setTimeout(() => btn.innerText = originalText, 1500);
            });
        }

        function copyAll() {
            const links = Array.from(resultList.querySelectorAll('a')).map(a => a.href).join('\n');
            navigator.clipboard.writeText(links).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = 'All Copied';
                setTimeout(() => btn.innerText = originalText, 1500);
            });
        }
    </script>
</body>
</html>
